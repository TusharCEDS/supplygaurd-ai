version: '3.8'

services:

  # PostgreSQL + TimescaleDB (our main database)
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: supplygaurd_db
    environment:
      POSTGRES_DB: supplygaurd
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data

  # Redis (for caching & fast lookups)
  redis:
    image: redis:7-alpine
    container_name: supplygaurd_redis
    ports:
      - "6379:6379"

  # Zookeeper (Kafka needs this to run)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: supplygaurd_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Kafka (our real-time message queue)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: supplygaurd_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  timescale_data: